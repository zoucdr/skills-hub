version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: "slice-of-life-anime-video-gen"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the slice-of-life-anime-video-gen skill for vertical anime video matching its genre anchors."
  - id: implicit-domain
    should_trigger: true
    prompt: "Slice of life anime—cozy daily life, calm composition, soft daylight."
  - id: implicit-domain-2
    should_trigger: true
    prompt: "Healing atmosphere, light piano and room tone."
  - id: implicit-image-to-video
    should_trigger: true
    prompt: "Animate my character still with an https image URL using slice-of-life-anime-video-gen."
  - id: negative-control
    should_trigger: false
    prompt: "Refactor my backend only."
  - id: negative-genre-mismatch
    should_trigger: false
    prompt: "Epic space battle explosion montage—no slice-of-life calm."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
