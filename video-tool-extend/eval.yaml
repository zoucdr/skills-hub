version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: video-tool-extend
trigger_tests:
  - id: explicit
    should_trigger: true
    prompt: "Use WeryAI extend on this HTTPS video."
  - id: negative-gen
    should_trigger: false
    prompt: "Make a new 15s commercial from text only."
outcome_tests:
  - id: skill-package-layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
      - file_exists: "scripts/video_extend.js"
