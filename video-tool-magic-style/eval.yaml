version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: video-tool-magic-style
trigger_tests:
  - id: explicit
    should_trigger: true
    prompt: "Use WeryAI magic style on this HTTPS video."
  - id: negative-gen
    should_trigger: false
    prompt: "Create a new video from a written script only."
outcome_tests:
  - id: skill-package-layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
      - file_exists: "scripts/video_magic_style.js"
