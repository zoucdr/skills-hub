version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: "shonen-battle-anime-video-gen"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the shonen-battle-anime-video-gen skill for vertical anime video matching its genre anchors."
  - id: implicit-domain
    should_trigger: true
    prompt: "Shonen anime battle—speed lines, dramatic pose, high energy vertical clip."
  - id: implicit-domain-2
    should_trigger: true
    prompt: "Dynamic action, battle aura glow, hot-blooded drum bed (instrumental)."
  - id: implicit-image-to-video
    should_trigger: true
    prompt: "Animate my character still with an https image URL using shonen-battle-anime-video-gen."
  - id: negative-control
    should_trigger: false
    prompt: "Refactor my backend only."
  - id: negative-genre-mismatch
    should_trigger: false
    prompt: "Slow shojo pastel romance walk—no battle shonen energy."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
