version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: "fashion-editorial-video-gen"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the fashion-editorial-video-gen skill for fashion_editorial_video with magazine composition and orbit."
  - id: implicit-runway
    should_trigger: true
    prompt: "Lookbook strut—strong pose, bold visual rhythm, deep house fashion bed, low-angle hero framing."
  - id: implicit-keywords
    should_trigger: true
    prompt: "Designer styling, unified color grade, walk-and-follow, quick beat cuts."
  - id: implicit-image-to-video
    should_trigger: true
    prompt: "Editorial motion from this outfit still—orbit (image URL)."
  - id: negative-control
    should_trigger: false
    prompt: "Refactor my backend only."
  - id: negative-flat-packshot
    should_trigger: false
    prompt: "Plain white e-commerce 360 only, no pose, no rhythm—pure SKU spin with zero editorial attitude."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
      - file_exists: "references/WERYAI_VIDEO_API.md"
