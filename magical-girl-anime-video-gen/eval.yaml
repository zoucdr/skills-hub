version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: "magical-girl-anime-video-gen"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the magical-girl-anime-video-gen skill for vertical anime video matching its genre anchors."
  - id: implicit-domain
    should_trigger: true
    prompt: "Magical girl anime—transformation sparkles, ribbons, cute fantasy."
  - id: implicit-domain-2
    should_trigger: true
    prompt: "Pastel magic, upbeat pop instrumental bed."
  - id: implicit-image-to-video
    should_trigger: true
    prompt: "Animate my character still with an https image URL using magical-girl-anime-video-gen."
  - id: negative-control
    should_trigger: false
    prompt: "Refactor my backend only."
  - id: negative-genre-mismatch
    should_trigger: false
    prompt: "Documentary interview talking head—no magical girl transformation."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
