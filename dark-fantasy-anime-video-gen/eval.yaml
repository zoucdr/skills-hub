version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: "dark-fantasy-anime-video-gen"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the dark-fantasy-anime-video-gen skill for vertical anime video matching its genre anchors."
  - id: implicit-domain
    should_trigger: true
    prompt: "Dark fantasy anime—gothic tone, ominous shadows, cursed atmosphere."
  - id: implicit-domain-2
    should_trigger: true
    prompt: "Shadowy lighting, dark ambient pad."
  - id: implicit-image-to-video
    should_trigger: true
    prompt: "Animate my character still with an https image URL using dark-fantasy-anime-video-gen."
  - id: negative-control
    should_trigger: false
    prompt: "Refactor my backend only."
  - id: negative-genre-mismatch
    should_trigger: false
    prompt: "Bright beach volleyball comedy—no dark fantasy gothic mood."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
