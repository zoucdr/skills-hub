version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: "supernatural-anime-video-gen"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the supernatural-anime-video-gen skill for vertical anime video matching its genre anchors."
  - id: implicit-domain
    should_trigger: true
    prompt: "Supernatural anime—spiritual energy glow, paranormal mystery mood."
  - id: implicit-domain-2
    should_trigger: true
    prompt: "Eerie teal glow, wind chime sparse ambience."
  - id: implicit-image-to-video
    should_trigger: true
    prompt: "Animate my character still with an https image URL using supernatural-anime-video-gen."
  - id: negative-control
    should_trigger: false
    prompt: "Refactor my backend only."
  - id: negative-genre-mismatch
    should_trigger: false
    prompt: "Stock market ticker dashboard—no supernatural shrine mood."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
