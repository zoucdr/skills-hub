version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: "minimalist-visual-video-gen"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the minimalist-visual-video-gen skill for minimalist_visual_video with negative space and calm design focus."
  - id: implicit-quiet-space
    should_trigger: true
    prompt: "Single object on white—clean geometry, ultra-slow dolly, minimal piano, restrained palette."
  - id: implicit-keywords
    should_trigger: true
    prompt: "Gallery calm—negative space, one-axis pan, ambient bed, no clutter."
  - id: implicit-image-to-video
    should_trigger: true
    prompt: "Micro-move on this product still—minimalist composition (image URL)."
  - id: negative-control
    should_trigger: false
    prompt: "Refactor my backend only."
  - id: negative-maximal
    should_trigger: false
    prompt: "Neon collage, ten stickers, whip-pan chaos, dubstep drop—no minimalist calm."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
      - file_exists: "references/WERYAI_VIDEO_API.md"
