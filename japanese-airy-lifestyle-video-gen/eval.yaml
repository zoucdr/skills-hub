version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: "japanese-airy-lifestyle-video-gen"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the japanese-airy-lifestyle-video-gen skill for a 9:16 japanese_airy_lifestyle_video with soft white tones and minimal contrast."
  - id: implicit-japanese-airy
    should_trigger: true
    prompt: "Japanese airy breakfast table—white ceramics, generous negative space, ultra-slow dolly-in, soft piano and acoustic guitar mood."
  - id: implicit-keywords
    should_trigger: true
    prompt: "Delicate daily life clip: pale linen, window light, calm composition, low contrast, eye-level slight drift."
  - id: implicit-still-life
    should_trigger: true
    prompt: "Still life motion—milk tea tones, airy highlights, static frame with micro plant sway, light instrumental bed."
  - id: implicit-image-to-video
    should_trigger: true
    prompt: "Animate this lifestyle still into japanese airy—gentle push-in, soft white grade, fingerpicked guitar (image URL)."
  - id: negative-control
    should_trigger: false
    prompt: "Refactor my Rust crate and add property-based tests only."
  - id: negative-neon-hdr
    should_trigger: false
    prompt: "Neon cyberpunk club, max HDR contrast, strobing lasers, bass drop EDM, whip-pan chaos."
  - id: negative-blockbuster
    should_trigger: false
    prompt: "Hollywood action trailer—explosions, teal-orange blockbuster grade, brass hits, shaky cam."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
      - file_exists: "references/WERYAI_VIDEO_API.md"
