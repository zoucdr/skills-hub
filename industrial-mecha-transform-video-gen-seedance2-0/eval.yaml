version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: "industrial-mecha-transform-video-gen-seedance2.0"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the industrial-mecha-transform-video-gen-seedance2.0 skill to transform a boring commute into a styled vertical clip."
  - id: implicit-domain
    should_trigger: true
    prompt: "Factory mecha power fantasy for hammering a nail, sparks and steel."
  - id: negative-control
    should_trigger: false
    prompt: "Refactor my Rust crate and add property-based tests only."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
