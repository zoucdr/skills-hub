version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: "anime-trailer-style-video-gen"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the anime-trailer-style-video-gen skill for vertical anime video matching its genre anchors."
  - id: implicit-domain
    should_trigger: true
    prompt: "Anime trailer style—epic teaser montage, suspenseful climax beat."
  - id: implicit-domain-2
    should_trigger: true
    prompt: "Trailer braam synth, epic drum build."
  - id: implicit-image-to-video
    should_trigger: true
    prompt: "Animate my character still with an https image URL using anime-trailer-style-video-gen."
  - id: negative-control
    should_trigger: false
    prompt: "Refactor my backend only."
  - id: negative-genre-mismatch
    should_trigger: false
    prompt: "Slow fireplace crackle vlog—no epic trailer sting."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
