version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: "horror-anime-video-gen"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the horror-anime-video-gen skill for vertical anime video matching its genre anchors."
  - id: implicit-domain
    should_trigger: true
    prompt: "Horror anime—eerie shadows, haunted corridor dread."
  - id: implicit-domain-2
    should_trigger: true
    prompt: "Unsettling ambient drone, subtle heartbeat."
  - id: implicit-image-to-video
    should_trigger: true
    prompt: "Animate my character still with an https image URL using horror-anime-video-gen."
  - id: negative-control
    should_trigger: false
    prompt: "Refactor my backend only."
  - id: negative-genre-mismatch
    should_trigger: false
    prompt: "Cute magical girl sparkles concert—no horror dread."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
