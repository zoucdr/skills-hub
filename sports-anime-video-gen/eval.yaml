version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: "sports-anime-video-gen"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the sports-anime-video-gen skill for vertical anime video matching its genre anchors."
  - id: implicit-domain
    should_trigger: true
    prompt: "Sports anime—intense motion, sweat highlights, competitive spirit."
  - id: implicit-domain-2
    should_trigger: true
    prompt: "Arena ambience, driving drum bed."
  - id: implicit-image-to-video
    should_trigger: true
    prompt: "Animate my character still with an https image URL using sports-anime-video-gen."
  - id: negative-control
    should_trigger: false
    prompt: "Refactor my backend only."
  - id: negative-genre-mismatch
    should_trigger: false
    prompt: "Chess library silence study—no sports anime sprint."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
