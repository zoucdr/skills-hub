version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: "healing-ghibli-style-video-gen"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the healing-ghibli-style-video-gen skill for vertical anime video matching its genre anchors."
  - id: implicit-domain
    should_trigger: true
    prompt: "Ghibli-inspired healing anime nature—warm sunlight, hand-painted peaceful fantasy."
  - id: implicit-domain-2
    should_trigger: true
    prompt: "Pastoral wind, woodwinds and gentle piano."
  - id: implicit-image-to-video
    should_trigger: true
    prompt: "Animate my character still with an https image URL using healing-ghibli-style-video-gen."
  - id: negative-control
    should_trigger: false
    prompt: "Refactor my backend only."
  - id: negative-genre-mismatch
    should_trigger: false
    prompt: "Neon cyberpunk alley rain—no pastoral healing sunlight."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
