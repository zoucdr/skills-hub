version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: "cyberpunk-anime-video-gen"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the cyberpunk-anime-video-gen skill for vertical anime video matching its genre anchors."
  - id: implicit-domain
    should_trigger: true
    prompt: "Cyberpunk anime—neon city, hologram UI, rainy reflections vertical."
  - id: implicit-domain-2
    should_trigger: true
    prompt: "Synthwave rhythm, rain ambience."
  - id: implicit-image-to-video
    should_trigger: true
    prompt: "Animate my character still with an https image URL using cyberpunk-anime-video-gen."
  - id: negative-control
    should_trigger: false
    prompt: "Refactor my backend only."
  - id: negative-genre-mismatch
    should_trigger: false
    prompt: "Pastoral farm sunrise—no cyberpunk neon."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
