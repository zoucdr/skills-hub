version: "1"
defaults: { trials: 3, timeout: 600, threshold: 0.75 }
skill: "seedance-2-prompt-engineering-video-gen"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the seedance-2-prompt-engineering-video-gen skill to plan a Seedance 2.0 prompt and generate a WeryAI text-to-video clip after I confirm."
  - id: implicit-domain
    should_trigger: true
    prompt: "Expand my short idea into a timecoded Seedance 2.0 English prompt, then run image-to-video on WeryAI with my https reference."
  - id: negative-control
    should_trigger: false
    prompt: "Refactor my Python service layer only."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
      - file_exists: "eval.yaml"
      - file_exists: "resources/seedance2-prompt-engineering-playbook.md"
      - file_exists: "resources/modes-and-weryai-mapping.md"
      - file_exists: "resources/recipes-weryai.md"
      - file_exists: "resources/camera-and-styles.md"
