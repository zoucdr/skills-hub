version: "1"
defaults:
  trials: 5
  timeout: 600
  threshold: 0.8
skill: "nation-resilience-hook-video-gen"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the nation-resilience-hook-video-gen skill for a short vertical about a country’s resilience: map flashes, three staccato beats, final risk twist, English subtitles with exact timing."
  - id: implicit-domain
    should_trigger: true
    prompt: "Make a TikTok hook: this country almost can’t collapse, quick resources geography military beats, then ‘but the real risk is…’ with on-screen English text."
  - id: implicit-paraphrase
    should_trigger: true
    prompt: "I need a geopolitics-style Reels clip—atlas montage, defense and resources labels, burned-in captions synced to cuts."
  - id: negative-control
    should_trigger: false
    prompt: "Optimize my Postgres indexes only."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
      - file_exists: "eval.yaml"
  - id: prompt-expansion-required
    type: llm_rubric
    rubric: |
      SKILL.md must require "## Prompt expansion (mandatory)", timed burned-in English subtitles, timeline scaling when duration is not 10, and full expanded prompt in the confirmation table before WeryAI submit.
