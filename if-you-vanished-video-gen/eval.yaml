version: "1"
defaults:
  trials: 5
  timeout: 600
  threshold: 0.8
skill: "if-you-vanished-video-gen"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use if-you-vanished-video-gen for a melancholic vertical: life after you disappear, timed English captions, safe tone."
  - id: implicit-domain
    should_trigger: true
    prompt: "Ten minutes after you vanish—empty home, silent phone, feed still moves, ‘nobody notices… yet’ with English on-screen text."
  - id: implicit-paraphrase
    should_trigger: true
    prompt: "I want a moody Short about absence: apartment quiet, notifications stop, world keeps scrolling—subtitles only, no harmful content."
  - id: negative-control
    should_trigger: false
    prompt: "Configure GitHub Actions for a Node project."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
      - file_exists: "eval.yaml"
  - id: prompt-expansion-required
    type: llm_rubric
    rubric: |
      SKILL.md must forbid self-harm content, require subtitle timing with duration scaling, and include mandatory prompt expansion and confirmation.
