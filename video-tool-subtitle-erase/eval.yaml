version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: video-tool-subtitle-erase
trigger_tests:
  - id: explicit
    should_trigger: true
    prompt: "Use WeryAI subtitle erase on this HTTPS video."
  - id: negative-gen
    should_trigger: false
    prompt: "Translate the subtitles in this video to Japanese."
outcome_tests:
  - id: skill-package-layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
      - file_exists: "scripts/video_subtitle_erase.js"
