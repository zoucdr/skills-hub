version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: "school-youth-anime-video-gen"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the school-youth-anime-video-gen skill for vertical anime video matching its genre anchors."
  - id: implicit-domain
    should_trigger: true
    prompt: "School anime youth—bright sunlight, campus friendship energy."
  - id: implicit-domain-2
    should_trigger: true
    prompt: "Youth pop-rock instrumental, running on track mood."
  - id: implicit-image-to-video
    should_trigger: true
    prompt: "Animate my character still with an https image URL using school-youth-anime-video-gen."
  - id: negative-control
    should_trigger: false
    prompt: "Refactor my backend only."
  - id: negative-genre-mismatch
    should_trigger: false
    prompt: "Corporate office cubicle overtime—no school youth anime."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
