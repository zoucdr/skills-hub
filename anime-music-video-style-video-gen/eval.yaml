version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: "anime-music-video-style-video-gen"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the anime-music-video-style-video-gen skill for vertical anime video matching its genre anchors."
  - id: implicit-domain
    should_trigger: true
    prompt: "Anime music video style—emotional montage, rhythmic dramatic highlights."
  - id: implicit-domain-2
    should_trigger: true
    prompt: "J-rock instrumental energy, hit moment flare."
  - id: implicit-image-to-video
    should_trigger: true
    prompt: "Animate my character still with an https image URL using anime-music-video-style-video-gen."
  - id: negative-control
    should_trigger: false
    prompt: "Refactor my backend only."
  - id: negative-genre-mismatch
    should_trigger: false
    prompt: "Single security camera static parking lot—no MV montage energy."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
