version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: "idol-performance-anime-video-gen"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the idol-performance-anime-video-gen skill for vertical anime video matching its genre anchors."
  - id: implicit-domain
    should_trigger: true
    prompt: "Idol anime concert—colorful stage lights, performance sparkle energy."
  - id: implicit-domain-2
    should_trigger: true
    prompt: "J-pop dance instrumental, crowd cheer bed."
  - id: implicit-image-to-video
    should_trigger: true
    prompt: "Animate my character still with an https image URL using idol-performance-anime-video-gen."
  - id: negative-control
    should_trigger: false
    prompt: "Refactor my backend only."
  - id: negative-genre-mismatch
    should_trigger: false
    prompt: "Wildlife nature documentary—no idol stage lights."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
