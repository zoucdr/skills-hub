version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: "isekai-fantasy-anime-video-gen"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the isekai-fantasy-anime-video-gen skill for vertical anime video matching its genre anchors."
  - id: implicit-domain
    should_trigger: true
    prompt: "Isekai fantasy anime—magical particles, epic landscape, enchanted mood."
  - id: implicit-domain-2
    should_trigger: true
    prompt: "Fantasy world gate, orchestral pad and sparkle SFX."
  - id: implicit-image-to-video
    should_trigger: true
    prompt: "Animate my character still with an https image URL using isekai-fantasy-anime-video-gen."
  - id: negative-control
    should_trigger: false
    prompt: "Refactor my backend only."
  - id: negative-genre-mismatch
    should_trigger: false
    prompt: "Office workplace comedy sitcom—no isekai fantasy particles."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
