version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: "ninja-stealth-anime-video-gen"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the ninja-stealth-anime-video-gen skill for vertical anime video matching its genre anchors."
  - id: implicit-domain
    should_trigger: true
    prompt: "Ninja anime stealth—rooftop chase, smoke, agile movement."
  - id: implicit-domain-2
    should_trigger: true
    prompt: "Night pursuit, tense percussion bed."
  - id: implicit-image-to-video
    should_trigger: true
    prompt: "Animate my character still with an https image URL using ninja-stealth-anime-video-gen."
  - id: negative-control
    should_trigger: false
    prompt: "Refactor my backend only."
  - id: negative-genre-mismatch
    should_trigger: false
    prompt: "Bright classroom comedy—no ninja stealth night chase."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
