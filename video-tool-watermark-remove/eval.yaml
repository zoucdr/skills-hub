version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: video-tool-watermark-remove
trigger_tests:
  - id: explicit
    should_trigger: true
    prompt: "Remove the watermark from this HTTPS video with WeryAI.."
  - id: negative-gen
    should_trigger: false
    prompt: "Erase only the subtitles, keep corner logos."
outcome_tests:
  - id: skill-package-layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
      - file_exists: "scripts/video_watermark_remove.js"
