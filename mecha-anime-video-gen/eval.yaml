version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: "mecha-anime-video-gen"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the mecha-anime-video-gen skill for vertical anime video matching its genre anchors."
  - id: implicit-domain
    should_trigger: true
    prompt: "Mecha anime—giant robot armor, energy core glow, cinematic impact."
  - id: implicit-domain-2
    should_trigger: true
    prompt: "Metallic details, heavy drum and servo SFX."
  - id: implicit-image-to-video
    should_trigger: true
    prompt: "Animate my character still with an https image URL using mecha-anime-video-gen."
  - id: negative-control
    should_trigger: false
    prompt: "Refactor my backend only."
  - id: negative-genre-mismatch
    should_trigger: false
    prompt: "Wedding chapel romance—no mecha robot combat."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
