version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: "samurai-anime-video-gen"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the samurai-anime-video-gen skill for vertical anime video matching its genre anchors."
  - id: implicit-domain
    should_trigger: true
    prompt: "Samurai anime—katana duel tension, japanese aesthetic, dramatic wind."
  - id: implicit-domain-2
    should_trigger: true
    prompt: "Disciplined standoff, taiko and shakuhachi mood."
  - id: implicit-image-to-video
    should_trigger: true
    prompt: "Animate my character still with an https image URL using samurai-anime-video-gen."
  - id: negative-control
    should_trigger: false
    prompt: "Refactor my backend only."
  - id: negative-genre-mismatch
    should_trigger: false
    prompt: "Spaceship dogfight lasers—no samurai duel."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
