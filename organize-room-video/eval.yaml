version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: organize-room-video
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the $organize-room-video skill to create a sample vertical video."
  - id: implicit-domain
    should_trigger: true
    prompt: "衣柜爆炸满屏，小熊把衣服叠成渐变色一排，最后关门一镜到底"
  - id: negative-control
    should_trigger: false
    prompt: "Refactor my React dashboard and add unit tests."
outcome_tests:
  - id: skill-package-layout
    type: deterministic
    checks:
      - description: "SKILL.md exists with name matching folder slug"
      - file_exists: "SKILL.md"
      - file_exists: "scripts/video_gen.js"
  - id: optional-quality
    type: llm_rubric
    rubric: |
      Does the assistant stay within WeryAI video_gen constraints (model, duration, aspect_ratio)?
      Does it refuse local image paths and ask for https URLs?
