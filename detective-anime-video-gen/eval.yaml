version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: "detective-anime-video-gen"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the detective-anime-video-gen skill for vertical anime video matching its genre anchors."
  - id: implicit-domain
    should_trigger: true
    prompt: "Detective anime mystery—clues, suspense shadows, deduction mood."
  - id: implicit-domain-2
    should_trigger: true
    prompt: "Suspense piano, low pulse ambience."
  - id: implicit-image-to-video
    should_trigger: true
    prompt: "Animate my character still with an https image URL using detective-anime-video-gen."
  - id: negative-control
    should_trigger: false
    prompt: "Refactor my backend only."
  - id: negative-genre-mismatch
    should_trigger: false
    prompt: "Sunny picnic food blog—no detective noir suspense."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
