version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: "post-apocalyptic-anime-video-gen"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the post-apocalyptic-anime-video-gen skill for vertical anime video matching its genre anchors."
  - id: implicit-domain
    should_trigger: true
    prompt: "Post-apocalyptic anime—ruined city, lonely survivor, dust decay."
  - id: implicit-domain-2
    should_trigger: true
    prompt: "Desolate wind, low synth pad."
  - id: implicit-image-to-video
    should_trigger: true
    prompt: "Animate my character still with an https image URL using post-apocalyptic-anime-video-gen."
  - id: negative-control
    should_trigger: false
    prompt: "Refactor my backend only."
  - id: negative-genre-mismatch
    should_trigger: false
    prompt: "Birthday party balloon room—no wasteland ruins."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
