version: "1"
defaults:
  trials: 3
  timeout: 600
  threshold: 0.75
skill: "slow-emotional-video-gen"
trigger_tests:
  - id: explicit-invoke
    should_trigger: true
    prompt: "Use the slow-emotional-video-gen skill for slow_emotional_video look matching this vertical style."
  - id: implicit-style
    should_trigger: true
    prompt: "A clip in this vertical style—slow emotional mood with matching camera and generic audio bed."
  - id: implicit-keywords
    should_trigger: true
    prompt: "Match the style anchor keywords from slow-emotional-video-gen SKILL.md in one English production brief."
  - id: implicit-image-to-video
    should_trigger: true
    prompt: "Turn this still into the same vertical style (image URL)."
  - id: negative-control
    should_trigger: false
    prompt: "Refactor my backend only."
  - id: negative-unrelated
    should_trigger: false
    prompt: "Configure Kubernetes ingress only."
outcome_tests:
  - id: layout
    type: deterministic
    checks:
      - file_exists: "SKILL.md"
      - file_exists: "references/WERYAI_VIDEO_API.md"
